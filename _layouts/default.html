<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="power9-banner">
      <img src="https://api.scryfall.com/cards/named?exact=Black+Lotus&set=lea&format=image&version=small" alt="Black Lotus" title="Black Lotus">
      <img src="https://api.scryfall.com/cards/named?exact=Mox+Pearl&set=lea&format=image&version=small" alt="Mox Pearl" title="Mox Pearl">
      <img src="https://api.scryfall.com/cards/named?exact=Mox+Sapphire&set=lea&format=image&version=small" alt="Mox Sapphire" title="Mox Sapphire">
      <img src="https://api.scryfall.com/cards/named?exact=Mox+Jet&set=lea&format=image&version=small" alt="Mox Jet" title="Mox Jet">
      <img src="https://api.scryfall.com/cards/named?exact=Mox+Ruby&set=lea&format=image&version=small" alt="Mox Ruby" title="Mox Ruby">
      <img src="https://api.scryfall.com/cards/named?exact=Mox+Emerald&set=lea&format=image&version=small" alt="Mox Emerald" title="Mox Emerald">
      <img src="https://api.scryfall.com/cards/named?exact=Ancestral+Recall&set=lea&format=image&version=small" alt="Ancestral Recall" title="Ancestral Recall">
      <img src="https://api.scryfall.com/cards/named?exact=Time+Walk&set=lea&format=image&version=small" alt="Time Walk" title="Time Walk">
      <img src="https://api.scryfall.com/cards/named?exact=Timetwister&set=lea&format=image&version=small" alt="Timetwister" title="Timetwister">
    </div>

    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="https://cubecobra.com/cube/list/mischief_unpowered?view=spoiler">Cube</a>
            <a href="{{ site.baseurl }}/about">About</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
