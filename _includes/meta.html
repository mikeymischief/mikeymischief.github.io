    <meta charset="utf-8" />
    <meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0'>

    {% if page.excerpt %}
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}" />
    <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}" />
    {% else %}
    <meta name="description" content="{{ site.description }}">
    <meta property="og:description" content="{{ site.description }}" />
    {% endif %}
    <meta name="author" content="{{ site.name }}" />

    {% assign og_title = page.title | default: site.name %}
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="twitter:title" content="{{ og_title }}" />

    {% if page.image %}
      {% assign og_image = page.image | absolute_url %}
    {% else %}
      {% assign og_image = site.avatar %}
    {% endif %}
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="twitter:image" content="{{ og_image }}" />

    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:site_name" content="{{ site.name }}" />
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
    {% if page.layout == 'post' %}
    <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
    <meta property="article:author" content="{{ site.name }}" />
    {% endif %}

    <meta name="twitter:card" content="summary_large_image" />
