<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ── Column indices ─────────────────────────────────────────────────────────────
// Date(0) Game(1) Player(2) Starting Position(3) Score(4) [Win col ignored—derived from max score]
// Starting MMR(6) Ending MMR(7) Delta(8) Round(9) Ending(10)
// Rows are grouped per game; blank rows separate games.
// Round is in the winner's row. Ending is in the row of the player who ended the game.
const C = { date:0, game:1, player:2, seat:3, score:4, startMmr:6, endMmr:7, delta:8, round:9, ending:10 };

// Ending letter → full label
const ENDING_LABELS = { B: 'Buildings', V: 'VP', C: 'Colonist' };

// Player color palette — assigned in alphabetical order
const PALETTE = ['#c87941','#7fb3a0','#e08585','#85B7EB','#b5c98f','#c48be8','#f4a261'];

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt = {
  int:  v => (v == null || v === '' || isNaN(+v)) ? '—' : String(Math.round(+v)),
  date: v => {
    if (!v) return '—';
    const d = new Date(v + ' 12:00');
    return isNaN(d) ? v : d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  },
  ending: v => {
    const k = (v || '').trim().toUpperCase();
    return ENDING_LABELS[k] || (k || '—');
  },
};

// ── Parse grouped game structure ───────────────────────────────────────────────
function parseGames(rawRows) {
  const games = [];
  let currentDate = '', currentGameNum = '', currentRows = [];

  const flush = () => {
    if (currentRows.length) {
      games.push({ date: currentDate, gameNum: currentGameNum, rows: currentRows });
      currentRows = [];
    }
  };

  for (const row of rawRows) {
    const date    = (row[C.date]   || '').trim();
    const gameNum = (row[C.game]   || '').trim();
    const player  = (row[C.player] || '').trim();
    if (date)    currentDate    = date;
    if (gameNum) currentGameNum = gameNum;
    if (!player) { flush(); continue; }
    currentRows.push(row);
  }
  flush();
  return games;
}

// ── Winner derived from highest score ─────────────────────────────────────────
function winnerOfGame(game) {
  let max = -Infinity, winner = null;
  for (const row of game.rows) {
    const s = parseInt(row[C.score]);
    if (!isNaN(s) && s > max) { max = s; winner = (row[C.player]||'').trim(); }
  }
  return winner;
}

// ── Build per-player index ─────────────────────────────────────────────────────
function buildPlayerIndex(games) {
  const index = {};
  for (const game of games) {
    for (const row of game.rows) {
      const name = (row[C.player] || '').trim();
      if (!name) continue;
      if (!index[name]) index[name] = [];
      index[name].push({ game, row });
    }
  }
  return index;
}

// ── MMR from sheet values ──────────────────────────────────────────────────────
const MMR_BASE = 1000;

function calculateMMR(games, allPlayers) {
  const current = {};
  const history = {};
  allPlayers.forEach(p => { current[p] = MMR_BASE; history[p] = []; });

  for (const game of games) {
    for (const row of game.rows) {
      const player   = (row[C.player] || '').trim();
      if (!player) continue;
      const endMmr   = parseFloat(row[C.endMmr]);
      const startMmr = parseFloat(row[C.startMmr]);
      const delta    = parseFloat(row[C.delta]);
      if (!isNaN(endMmr)) {
        current[player] = endMmr;
        history[player].push({ game, startMmr: isNaN(startMmr) ? MMR_BASE : startMmr, endMmr, delta: isNaN(delta) ? 0 : delta });
      }
    }
  }
  return { current, history };
}

// ── Shared state ───────────────────────────────────────────────────────────────
let _playerIndex, _allPlayers, _games, _mmr, _colorMap;

function getColor(player) { return _colorMap[player] || '#c87941'; }

const PLAYER_IMG = {
  'Mikey':    '/images/PuertoRico/dapper_man.png',
  'Jeff':     '/images/PuertoRico/working_man.png',
  'Jamie':    '/images/PuertoRico/middle_age_woman.png',
  'Manushak': '/images/PuertoRico/old_lady.png',
  'Savada':   '/images/PuertoRico/young_girl.png',
};

// ── All Games view ─────────────────────────────────────────────────────────────
function renderAllGames() {
  const profile = document.getElementById('pr-profile');
  profile.innerHTML = '';
  const wrap = document.createElement('div');

  [..._games].reverse().forEach(game => {
    if (!game.rows.length) return;
    const winner   = winnerOfGame(game);
    const winRow   = game.rows.find(r => (r[C.player]||'').trim() === winner);
    const endRow   = game.rows.find(r => (r[C.ending]||'').trim() !== '');
    const endPlayer  = endRow ? (endRow[C.player]||'').trim() : null;
    const endLabel   = endRow ? fmt.ending(endRow[C.ending]) : null;
    const gameRound  = winRow ? fmt.int(winRow[C.round]) : null;

    const metaParts = [fmt.date(game.date)];
    if (gameRound && gameRound !== '—') metaParts.push('Round ' + gameRound);

    const sorted = [...game.rows]
      .filter(r => (r[C.player]||'').trim())
      .sort((a, b) => parseInt(b[C.score]) - parseInt(a[C.score]));

    const card = document.createElement('div');
    card.className = 'pr-game-card';

    const header = document.createElement('div');
    header.className = 'pr-game-card-header';
    header.innerHTML = `<span class="pr-game-card-num">Game ${game.gameNum || '?'}</span><span class="pr-game-card-meta">${metaParts.join(' · ')}</span>`;
    card.appendChild(header);

    const table = document.createElement('table');
    table.className = 'pr-table';
    const tbody = document.createElement('tbody');
    sorted.forEach((row, idx) => {
      const player  = (row[C.player]||'').trim();
      const won     = player === winner;
      const isEnder = player === endPlayer;
      const color   = getColor(player);
      const tr      = document.createElement('tr');
      if (won) tr.className = 'win-row';
      const badges = [
        won     ? '<span class="win-badge">WIN</span>'                                : '',
        isEnder && endLabel ? `<span class="end-badge">${endLabel}</span>` : '',
      ].filter(Boolean).join(' ');
      tr.innerHTML = `
        <td></td>
        <td class="num">Seat ${fmt.int(row[C.seat])}</td>
        <td class="num score">${fmt.int(row[C.score])} VP</td>
        <td>${badges}</td>`;
      const nameCell = document.createElement('td');
      const nameBtn  = document.createElement('button');
      nameBtn.className = 'pr-name-link';
      nameBtn.style.color = color;
      nameBtn.textContent = player;
      nameBtn.addEventListener('click', () => activatePlayer(player));
      nameCell.appendChild(nameBtn);
      tr.cells[0].replaceWith(nameCell);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    card.appendChild(table);
    wrap.appendChild(card);
  });

  profile.appendChild(wrap);
}

function activateAllGames() {
  document.querySelectorAll('.pr-standing-card').forEach(c => c.classList.remove('active'));
  const allCard = document.getElementById('pr-all-games-card');
  if (allCard) allCard.classList.add('active');
  renderAllGames();
}

// ── Activate player (standings card click; clicking active card returns to All Games) ──
function activatePlayer(player) {
  const card = document.querySelector(`.pr-standing-card[data-p="${CSS.escape(player)}"]`);
  const wasActive = card && card.classList.contains('active');
  document.querySelectorAll('.pr-standing-card').forEach(c => c.classList.remove('active'));
  if (wasActive) { renderAllGames(); return; }
  if (card) card.classList.add('active');
  renderProfile(player);
}

// ── Render standings row ───────────────────────────────────────────────────────
function renderStandings() {
  const el = document.getElementById('pr-standings');
  el.innerHTML = '';

  const ranked = _allPlayers
    .map(p => ({ p, mmr: _mmr.current[p] || MMR_BASE }))
    .sort((a, b) => b.mmr - a.mmr);

  ranked.forEach(({ p, mmr }, i) => {
    const card = document.createElement('div');
    card.className = 'pr-standing-card';
    card.dataset.p = p;
    card.style.setProperty('--p-color', getColor(p));
    if (PLAYER_IMG[p]) card.style.setProperty('--card-img', `url('${PLAYER_IMG[p]}')`);
    card.innerHTML = `
      <div class="pr-standing-rank">#${i+1}</div>
      <div class="pr-standing-name">${p}</div>
      <div class="pr-standing-mmr">${Math.round(mmr)} MMR</div>
    `;
    card.addEventListener('click', () => activatePlayer(p));
    el.appendChild(card);
  });

  const allCard = document.createElement('div');
  allCard.className = 'pr-standing-card pr-standing-card--all';
  allCard.id = 'pr-all-games-card';
  allCard.innerHTML = `
    <div class="pr-standing-rank">&#8203;</div>
    <div class="pr-standing-name">All Games</div>
    <div class="pr-standing-mmr">&#8203;</div>
  `;
  allCard.addEventListener('click', activateAllGames);
  el.appendChild(allCard);
}

// ── MMR graph (multi-player, DOM-based) ───────────────────────────────────────
function initMMRGraph(primaryPlayer) {
  const section = document.getElementById('pr-mmr-graph-section');
  if (!section) return;
  const hist = _mmr.history[primaryPlayer] || [];
  if (hist.length < 2) { section.innerHTML = ''; return; }

  section.innerHTML = `
    <div class="pr-mmr-graph">
      <div class="pr-mmr-graph-header">
        <span class="pr-mmr-graph-label">MMR Over Time</span>
        <div class="pr-mmr-legend" id="pr-mmr-legend"></div>
      </div>
      <div id="pr-mmr-svg-wrap"></div>
    </div>`;

  const activePlayers = new Set([primaryPlayer]);
  const legend = document.getElementById('pr-mmr-legend');

  _allPlayers.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pr-mmr-legend-btn' + (p === primaryPlayer ? ' active' : '');
    btn.style.setProperty('--p-color', getColor(p));
    btn.textContent = p;
    btn.dataset.p = p;
    btn.addEventListener('click', () => {
      if (p === primaryPlayer) return;
      if (activePlayers.has(p)) { activePlayers.delete(p); btn.classList.remove('active'); }
      else                      { activePlayers.add(p);    btn.classList.add('active'); }
      drawMMRSvg([...activePlayers], primaryPlayer);
    });
    legend.appendChild(btn);
  });

  drawMMRSvg([primaryPlayer], primaryPlayer);
}

function drawMMRSvg(players, primaryPlayer) {
  const wrap = document.getElementById('pr-mmr-svg-wrap');
  if (!wrap) return;

  const W = 500, H = 88;
  const padL = 40, padR = 10, padT = 10, padB = 10;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  // Shared Y scale across all active players
  const allVals = [];
  players.forEach(p => {
    const h = _mmr.history[p] || [];
    if (h.length) allVals.push(h[0].startMmr, ...h.map(e => e.endMmr));
  });
  if (!allVals.length) { wrap.innerHTML = ''; return; }

  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const span = Math.max(maxV - minV, 40);
  const lo = minV - span * 0.2, hi = maxV + span * 0.2;

  // X axis: shared game-index across all active players
  const maxPts = Math.max(...players.map(p => (_mmr.history[p]||[]).length + 1));
  const xOf = i => padL + (maxPts <= 1 ? plotW / 2 : (i / (maxPts - 1)) * plotW);
  const yOf = v => padT + plotH * (1 - (v - lo) / (hi - lo));
  const clampY = v => Math.min(Math.max(v, padT), padT + plotH);

  const base1000y = clampY(yOf(1000)).toFixed(1);
  const yTicksSvg = [...new Set([Math.round(lo + span*0.2), 1000, Math.round(hi - span*0.2)])]
    .filter(v => v >= lo && v <= hi)
    .map(v => `<text x="${padL-5}" y="${(yOf(v)+3).toFixed(1)}" text-anchor="end" font-size="7.5" fill="rgba(233,220,200,0.22)" font-family="monospace">${Math.round(v)}</text>`)
    .join('');

  let defs = '<defs>';
  let paths = '', dots = '';

  players.forEach((p, pi) => {
    const h = _mmr.history[p] || [];
    if (!h.length) return;
    const color = getColor(p);
    const isPrimary = p === primaryPlayer;
    const gid = 'mmrg' + pi + p.replace(/[^a-zA-Z0-9]/g, '');
    const pts = [h[0].startMmr, ...h.map(e => e.endMmr)];
    const tipLabels = ['Start', ...h.map(e => fmt.date(e.game.date) + (e.game.gameNum ? ' #'+e.game.gameNum : ''))];
    const tipDeltas = [null, ...h.map(e => e.delta)];

    defs += `<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="${isPrimary ? '0.28' : '0.08'}"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
    </linearGradient>`;

    const linePath = pts.map((v, i) => `${i===0?'M':'L'}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ');
    if (isPrimary) {
      const areaPath = `${linePath} L${xOf(pts.length-1).toFixed(1)},${(padT+plotH).toFixed(1)} L${xOf(0).toFixed(1)},${(padT+plotH).toFixed(1)} Z`;
      paths += `<path d="${areaPath}" fill="url(#${gid})"/>`;
    }
    paths += `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="${isPrimary?'2':'1.5'}" stroke-opacity="${isPrimary?'1':'0.65'}" stroke-linejoin="round" stroke-linecap="round"/>`;

    dots += pts.map((v, i) => {
      const d = tipDeltas[i];
      const tip = `${p}: ${tipLabels[i]}  ${Math.round(v)} MMR${d != null ? '  '+(d>0?'+':'')+d.toFixed(1) : ''}`;
      return `<circle class="pr-mmr-dot" cx="${xOf(i).toFixed(1)}" cy="${yOf(v).toFixed(1)}" r="${isPrimary?'3.5':'2.5'}" fill="${color}" stroke="#141008" stroke-width="1.5" data-tip="${tip.replace(/"/g,'&quot;')}"/>`;
    }).join('');
  });
  defs += '</defs>';

  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
    ${defs}
    <line x1="${padL}" y1="${base1000y}" x2="${W-padR}" y2="${base1000y}" stroke="rgba(200,121,65,0.18)" stroke-width="1" stroke-dasharray="3,3"/>
    ${yTicksSvg}
    ${paths}${dots}
  </svg>`;
}

// ── Render player profile ──────────────────────────────────────────────────────
function renderProfile(player) {
  const color   = getColor(player);
  const entries = _playerIndex[player] || [];
  const wins    = entries.filter(({ game, row }) => winnerOfGame(game) === (row[C.player]||'').trim());
  const scores  = entries.map(({ row }) => parseInt(row[C.score])).filter(v => !isNaN(v));
  const avgScore  = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
  const bestScore = scores.length ? Math.max(...scores) : null;
  const winRate   = entries.length ? wins.length / entries.length : null;

  const hist       = _mmr.history[player] || [];
  const mmrCurrent = hist.length ? hist[hist.length-1].endMmr : (_mmr.current[player] || MMR_BASE);
  const lastDelta  = hist.length ? hist[hist.length-1].delta : 0;
  const deltaSign  = lastDelta > 0 ? '+' : '';
  const deltaClass = lastDelta > 0 ? 'pos' : lastDelta < 0 ? 'neg' : 'neu';

  const ranked = _allPlayers
    .map(p => ({ p, mmr: _mmr.current[p] || MMR_BASE }))
    .sort((a,b) => b.mmr - a.mmr);
  const rank = ranked.findIndex(x => x.p === player) + 1;

  const profile = document.getElementById('pr-profile');
  profile.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'pr-profile';
  wrap.dataset.p = player;
  wrap.style.setProperty('--p-color', color);

  wrap.innerHTML = `
    <div class="pr-player-hero">
      <div class="pr-player-hero-left">
        <div class="pr-player-hero-eyebrow">Player Profile</div>
        <div class="pr-player-hero-name">${player}</div>
        <div class="pr-player-hero-sub">
          ${entries.length} game${entries.length!==1?'s':''}&ensp;&middot;&ensp;${wins.length} win${wins.length!==1?'s':''}&ensp;&middot;&ensp;${winRate!=null?(winRate*100).toFixed(0)+'% win rate':'no games yet'}
        </div>
      </div>
      <div class="pr-player-hero-mmr">
        <div class="pr-player-hero-mmr-label">MMR</div>
        <div class="pr-player-hero-mmr-value">${mmrCurrent}</div>
        ${hist.length ? `<div class="pr-player-hero-mmr-delta ${deltaClass}">${deltaSign}${lastDelta.toFixed(1)} last game</div>` : ''}
      </div>
    </div>

    <div id="pr-mmr-graph-section"></div>

    <div class="pr-stat-bar">
      <div class="pr-stat-card">
        <div class="pr-stat-label">MMR Rank</div>
        <div class="pr-stat-value">#${rank}</div>
        <div class="pr-stat-sub">among active players</div>
      </div>
      <div class="pr-stat-card">
        <div class="pr-stat-label">Games</div>
        <div class="pr-stat-value">${entries.length || '—'}</div>
        <div class="pr-stat-sub">sessions played</div>
      </div>
      <div class="pr-stat-card">
        <div class="pr-stat-label">Wins</div>
        <div class="pr-stat-value">${wins.length}</div>
        <div class="pr-stat-sub">${winRate!=null?(winRate*100).toFixed(0)+'% win rate':'—'}</div>
      </div>
      <div class="pr-stat-card">
        <div class="pr-stat-label">Avg Score</div>
        <div class="pr-stat-value">${avgScore!=null?avgScore.toFixed(1):'—'}</div>
        <div class="pr-stat-sub">victory points</div>
      </div>
      <div class="pr-stat-card">
        <div class="pr-stat-label">Best Score</div>
        <div class="pr-stat-value">${bestScore!=null?bestScore:'—'}</div>
        <div class="pr-stat-sub">personal best VP</div>
      </div>
    </div>

    <div class="pr-section-label">Game Log</div>
    <div class="pr-table-wrap">
      <table class="pr-table">
        <thead>
          <tr>
            <th>Date</th>
            <th class="num">Game</th>
            <th class="num">Seat</th>
            <th class="num">Score</th>
            <th class="num" title="Finishing position by score">Place</th>
            <th class="num" title="Round the game ended on">Round</th>
            <th title="How the game ended: Buildings · VP · Colonist">Ending</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="pr-tbody"></tbody>
      </table>
    </div>
  `;
  profile.appendChild(wrap);
  initMMRGraph(player);

  const tbody = document.getElementById('pr-tbody');
  [...entries].reverse().forEach(({ game, row }) => {
    const winner = winnerOfGame(game);
    const won    = winner === (row[C.player]||'').trim();
    const winRow = game.rows.find(r => (r[C.player]||'').trim() === winner);
    const endRow = game.rows.find(r => (r[C.ending]||'').trim() !== '');
    const gameRound   = winRow ? fmt.int(winRow[C.round])     : '—';
    const endPlayer   = endRow ? (endRow[C.player]||'').trim() : null;
    const gameEnding  = endRow ? (endPlayer ? `${endPlayer} · ${fmt.ending(endRow[C.ending])}` : fmt.ending(endRow[C.ending])) : '—';

    const sortedScores = game.rows.map(r => parseInt(r[C.score])).filter(v => !isNaN(v)).sort((a,b) => b-a);
    const myScore = parseInt(row[C.score]);
    const place = !isNaN(myScore) ? '#' + (sortedScores.indexOf(myScore) + 1) : '—';

    const tr = document.createElement('tr');
    if (won) tr.className = 'win-row';

    tr.innerHTML = `
      <td>${fmt.date(game.date)}</td>
      <td class="num">${game.gameNum||'—'}</td>
      <td class="num">${fmt.int(row[C.seat])}</td>
      <td class="num score">${fmt.int(row[C.score])}</td>
      <td class="num">${place}</td>
      <td class="num">${gameRound}</td>
      <td>${gameEnding}</td>
      <td>${won?'<span class="win-badge">WIN</span>':''}</td>
    `;
    tbody.appendChild(tr);
  });

  if (!entries.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="7" style="text-align:center;padding:24px;color:var(--pr-ink-faint);font-style:italic">No games recorded yet.</td>`;
    tbody.appendChild(tr);
  }
}

// ── Load data ──────────────────────────────────────────────────────────────────
async function init() {
  const statusEl  = document.getElementById('pr-status');
  const contentEl = document.getElementById('pr-content');

  let csvUrl = '';
  try {
    const cfg = await fetch('/data/config.json').then(r => r.json());
    csvUrl = cfg.pr_stats || '';
  } catch(e) {}

  if (!csvUrl) {
    statusEl.textContent = 'Stats sheet not configured yet.';
    return;
  }

  Papa.parse(csvUrl, {
    download: true,
    complete({ data }) {
      if (data.length < 2) { statusEl.textContent = 'Sheet appears empty.'; return; }

      const rawRows = data.slice(1);
      _games       = parseGames(rawRows);
      _playerIndex = buildPlayerIndex(_games);
      _allPlayers  = Object.keys(_playerIndex).sort();
      _mmr         = calculateMMR(_games, _allPlayers);
      _colorMap    = Object.fromEntries(_allPlayers.map((p, i) => [p, PALETTE[i % PALETTE.length]]));

      if (!_allPlayers.length) { statusEl.textContent = 'No player data found.'; return; }

      renderStandings();

      statusEl.classList.add('hidden');
      contentEl.classList.remove('hidden');

      // Tooltip for MMR graph dots
      const tip = document.createElement('div');
      tip.className = 'pr-mmr-tooltip';
      document.body.appendChild(tip);
      document.addEventListener('mouseover', e => {
        const dot = e.target.closest('.pr-mmr-dot');
        if (dot && dot.dataset.tip) { tip.textContent = dot.dataset.tip; tip.style.display = 'block'; }
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest('.pr-mmr-dot')) tip.style.display = 'none';
      });
      document.addEventListener('mousemove', e => {
        if (tip.style.display !== 'none') { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 32) + 'px'; }
      });

      activateAllGames();
    },
    error(err) {
      statusEl.textContent = 'Could not load the stats sheet (' + err + ').';
    },
  });
}

init();
</script>
