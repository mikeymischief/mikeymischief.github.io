---
layout: default
---

<style>
.index-hero {
  position: relative;
  background-image: url('/images/bg/Diabolic-Tutor-Tenth-Edition-MtG-Art.jpg');
  background-size: cover;
  background-position: center 20%;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 40px;
  padding: 140px 32px 36px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.index-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(13,15,26,0.1) 0%, rgba(13,15,26,0.65) 50%, rgba(13,15,26,0.97) 100%);
}
.index-hero > * { position: relative; z-index: 1; }
.index-hero-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #8b8ea8;
  margin-bottom: 10px;
}
.index-hero h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  color: #e8d5a3;
  margin: 0 0 10px;
  line-height: 1.05;
  border: none;
  padding: 0;
}
.index-hero-sub {
  color: #8b8ea8;
  font-size: 1rem;
  line-height: 1.5;
  margin: 0;
}
</style>

<div class="index-hero">
  <h1>Posts</h1>
  <p class="index-hero-sub">Cube drafts, Commander, and everything in between.</p>
</div>

<div class="posts">
  {% for post in site.posts %}
    <article class="post post-with-date">

      <div class="post-date-stamp">
        <span class="post-date-month">{{ post.date | date: "%b" }}</span>
        <span class="post-date-day">{{ post.date | date: "%-d" }}</span>
        <span class="post-date-year">{{ post.date | date: "%Y" }}</span>
      </div>

      <div class="post-content">
        <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

        <div class="entry">
          {{ post.excerpt }}
        </div>

        <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
      </div>

    </article>
  {% endfor %}
</div>
